<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RAG Chatbot</title>

<style>

body{
    font-family:Arial;
    background:#f4f4f4;
    margin:0;
}

.container{
    width:900px;
    margin:auto;
    margin-top:30px;
}

h2{
    text-align:center;
}

#chat{
    height:450px;
    overflow-y:auto;
    background:white;
    border-radius:8px;
    padding:20px;
    border:1px solid #ccc;
}

.user{
    text-align:right;
    margin:10px;
}

.bot{
    text-align:left;
    margin:10px;
}

.msg{
    display:inline-block;
    padding:10px;
    border-radius:10px;
    max-width:70%;
}

.user .msg{
    background:#007bff;
    color:white;
}

.bot .msg{
    background:#ececec;
}

.controls{
    margin-top:20px;
}

textarea{
    width:100%;
    height:80px;
    padding:10px;
}

button{
    margin-top:10px;
    padding:10px 25px;
    cursor:pointer;
}

input[type=file]{
    margin-bottom:15px;
}

</style>

</head>

<body>

<div class="container">

<h2>📄 AI RAG Chatbot</h2>

<input type="file" id="file" accept=".txt">

<div id="chat"></div>

<div class="controls">

<textarea
id="question"
placeholder="Ask a question..."></textarea>

<button onclick="askQuestion()">Send</button>

</div>

</div>

<script>

let uploadedText="";

document.getElementById("file").addEventListener("change",function(e){

const file=e.target.files[0];

if(!file){

return;

}

const reader=new FileReader();

reader.onload=function(event){

uploadedText=event.target.result;

addBotMessage("✅ File uploaded successfully.");

}

reader.readAsText(file);

});

function addUserMessage(text){

document.getElementById("chat").innerHTML+=
`
<div class="user">
<div class="msg">${text}</div>
</div>
`;

scrollChat();

}

function addBotMessage(text){

document.getElementById("chat").innerHTML+=
`
<div class="bot">
<div class="msg">${text}</div>
</div>
`;

scrollChat();

}

function scrollChat(){

const chat=document.getElementById("chat");

chat.scrollTop=chat.scrollHeight;

}

async function askQuestion(){

const question=document.getElementById("question").value;

if(question==""){

alert("Enter question");

return;

}

if(uploadedText==""){

alert("Upload a text file first.");

return;

}

addUserMessage(question);

document.getElementById("question").value="";

try{

const response=await fetch("YOUR_N8N_WEBHOOK_URL",{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

message:question,

document:uploadedText

})

});

const data=await response.json();

addBotMessage(data.answer);

}catch(err){

addBotMessage("Error contacting chatbot.");

}

}
const UPLOAD_WEBHOOK_URL = "https://monalgaur.app.n8n.cloud/webhook/c216ac61-2bfb-4622-8152-822e8f2ea823/chat";
const CHAT_WEBHOOK_URL   = "https://monalgaur.app.n8n.cloud/webhook-test/chatbot";

</script>

</body>
</html>
